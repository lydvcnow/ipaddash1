<script>
// ══════════════════════════════════════════════════

var US_HOLIDAYS_2026 = {
  '01-01':'元旦','01-19':'MLK Day','02-16':'总统日',
  '05-25':'阵亡将士纪念日','06-19':'奴隶解放日',

var WMO_CODES = {
  0:'晴',1:'基本晴',2:'多云',3:'阴',
  45:'雾',48:'冻雾',
  51:'毛毛雨',53:'中毛毛雨',55:'强毛毛雨',

  95:'雷暴',96:'雷暴+冰雹',99:'强雷暴'

var WX_ICONS = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',
  45:'🌫',48:'🌫',
  51:'🌦',53:'🌦',55:'🌧',
  61:'🌧',63:'🌧',65:'🌧',
  71:'🌨',73:'🌨',75:'❄️',77:'🌨',
  80:'🌦',81:'🌧',82:'⛈',
  85:'🌨',86:'❄️',
  95:'⛈',96:'⛈',99:'⛈'
};

var WEEK_DAYS = ['日','一','二','三','四','五','六'];
var MONTHS_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ══════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function dateStr(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}

function mmdd(d) {
  return pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}

function xhr(url, cb) {
  var req = new XMLHttpRequest();
  req.open('GET', url, true);
  req.timeout = 12000;
  req.onreadystatechange = function() {
    if (req.readyState === 4) {
      if (req.status === 200) {
        try { cb(null, JSON.parse(req.responseText)); }
        catch(e) { cb(e, null); }
      } else {
        cb(new Error('HTTP ' + req.status), null);
      }
    }
  };
  req.ontimeout = function() { cb(new Error('timeout'), null); };
  req.send();
}

function beaufort(ms) {
  if (ms < 0.3) return 0;
  if (ms < 1.6) return 1;
  if (ms < 3.4) return 2;
  if (ms < 5.5) return 3;
  if (ms < 8.0) return 4;
  if (ms < 10.8) return 5;
  if (ms < 13.9) return 6;
  if (ms < 17.2) return 7;
  return 8;
}

function windDir(deg) {
  var dirs = ['北','东北','东','东南','南','西南','西','西北'];
  return dirs[Math.round(deg/45) % 8];
}

// ══════════════════════════════════════════════════
// MOON PHASE
// ══════════════════════════════════════════════════

function moonPhase(date) {
  // Known new moon: Jan 29, 2025 (synodic month ~29.53 days)
  var known = new Date(2025, 0, 29);
  var diff = (date - known) / (1000 * 60 * 60 * 24);
  var cycle = 29.53059;
  var phase = ((diff % cycle) + cycle) % cycle;
  // Returns {icon, name, age}
  var icon, name;
  if (phase < 1.5)      { icon = '🌑'; name = '新月'; }
  else if (phase < 7.4) { icon = '🌒'; name = '峨眉月'; }
  else if (phase < 8.9) { icon = '🌓'; name = '上弦月'; }
  else if (phase < 14.0){ icon = '🌔'; name = '盈凸月'; }
  else if (phase < 15.5){ icon = '🌕'; name = '满月'; }
  else if (phase < 21.4){ icon = '🌖'; name = '亏凸月'; }
  else if (phase < 22.9){ icon = '🌗'; name = '下弦月'; }
  else if (phase < 28.0){ icon = '🌘'; name = '残月'; }
  else                  { icon = '🌑'; name = '新月'; }
  return { icon: icon, name: name, age: Math.round(phase) };
}

function isFullOrNew(date) {
  var m = moonPhase(date);
  return m.name === '满月' || m.name === '新月';
}

// ══════════════════════════════════════════════════
// FISHING SCORE
// ══════════════════════════════════════════════════

function scoreConditions(wind, wave, code) {
  var score = 80;
  if (wind > 10)      score -= 35;
  else if (wind > 7)  score -= 20;
  else if (wind > 5)  score -= 8;

  if (wave !== null) {
    if (wave > 2.5)      score -= 30;
    else if (wave > 1.5) score -= 15;
    else if (wave > 1.0) score -= 5;
  }

  var badCodes = [80,81,82,95,96,99,65,63];
  var mildCodes = [61];
  var isBad = false, isMild = false;
  for (var i = 0; i < badCodes.length; i++) { if (code === badCodes[i]) { isBad = true; break; } }
  for (var j = 0; j < mildCodes.length; j++) { if (code === mildCodes[j]) { isMild = true; break; } }
  if (isBad)  score -= 20;
  if (isMild) score -= 8;

  return Math.max(0, Math.min(100, score));
}

function scoreStars(score) {
  if (score >= 82) return '★★★';
  if (score >= 65) return '★★☆';
  return '★☆☆';
}

function scoreClass(score) {
  if (score >= 82) return 'score-good';
  if (score >= 65) return 'score-mid';
  return 'score-bad';
}

// Best fishing windows from hourly data
function calcWindows(hourlyWind, hourlyWave, hourlyCode, tides) {
  // Build tide transition windows (1hr before/after high tide change = active feed)
  var tideMap = {};
  if (tides) {
    for (var t = 0; t < tides.length; t++) {
      var td = tides[t];
      var hStr = td.t.substr(11, 2);
      var hh = parseInt(hStr, 10);
      tideMap[hh] = td.type;
      if (hh > 0) tideMap[hh-1] = td.type + '_pre';
      if (hh < 23) tideMap[hh+1] = td.type + '_post';
    }
  }

  var windows = [];
  for (var h = 6; h <= 20; h++) {
    var wind = hourlyWind[h] || 0;
    var wave = hourlyWave ? (hourlyWave[h] || null) : null;
    var code = hourlyCode[h] || 0;
    var score = scoreConditions(wind, wave, code);

    var label = '';
    if (tideMap[h]) {
      var tt = tideMap[h];
      if (tt === 'H' || tt === 'H_pre' || tt === 'H_post') label = '高潮变水';
      else if (tt === 'L' || tt === 'L_pre' || tt === 'L_post') label = '低潮变水';
    }
    if (h >= 17 && h < 20) { score += 8; label = label || '傍晚黄金'; }
    else if (h >= 13 && h < 17) { score += 4; label = label || '午后'; }

    if (score < 40) continue;

    windows.push({
      h: h,
      time: pad2(h) + ':00',
      score: score,
      label: label || (h < 12 ? '上午' : '下午'),
      stars: scoreStars(score)
    });
  }

  // Deduplicate nearby hours, keep best
  windows.sort(function(a,b) { return b.score - a.score; });
  var kept = [];
  for (var wi = 0; wi < windows.length; wi++) {
    var w = windows[wi];
    var overlap = false;
    for (var ki = 0; ki < kept.length; ki++) {
      if (Math.abs(kept[ki].h - w.h) < 2) { overlap = true; break; }
    }
    if (!overlap) { kept.push(w); }
    if (kept.length >= 4) break;
  }
  kept.sort(function(a,b) { return a.h - b.h; });
  return kept;
}

// ══════════════════════════════════════════════════
// WEATHER
// ══════════════════════════════════════════════════

function loadWeather(lat, lon, locationName) {
  var el = document.getElementById('wx-content');
  var today = new Date();
  var ds = dateStr(today);

  var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat +
    '&longitude=' + lon +
    '&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,surface_pressure,relative_humidity_2m' +
    '&temperature_unit=fahrenheit&windspeed_unit=ms&timezone=America%2FLos_Angeles';

  xhr(url, function(err, data) {
    if (err || !data || !data.current) {
      el.innerHTML = '<div class="err-msg">天气加载失败</div>';
      return;
    }
    var c = data.current;
    var tempF = Math.round(c.temperature_2m);
    var tempC = Math.round((tempF - 32) * 5/9);
    var code = c.weather_code || c.weathercode || 0;
    var wind = c.windspeed_10m || 0;
    var wdir = c.winddirection_10m || 0;
    var pres = Math.round(c.surface_pressure || 1013);
    var hum  = Math.round(c.relative_humidity_2m || 0);
    var bf   = beaufort(wind);
    var icon = WX_ICONS[code] || '?';
    var desc = WMO_CODES[code] || '未知';
    var wdirStr = windDir(wdir);

    var windClass = wind > 10 ? 'warn' : (wind > 6 ? 'caution' : '');

    el.innerHTML =
      '<div class="wx-main">' +
        '<div class="wx-icon">' + icon + '</div>' +
        '<div class="wx-temp-block">' +
          '<div class="wx-temp">' + tempF + '°F</div>' +
          '<div class="wx-desc">' + desc + ' · ' + tempC + '°C</div>' +
        '</div>' +
        '<div class="wx-location">' + (locationName || '') + '</div>' +
      '</div>' +
      '<div class="wx-grid">' +
        '<div class="wx-item"><span class="wx-item-icon">💨</span>' +
          '<div><div class="wx-item-label">风速</div>' +
          '<div class="wx-item-val ' + windClass + '">' + wind.toFixed(1) + 'm/s</div></div>' +
        '</div>' +
        '<div class="wx-item"><span class="wx-item-icon">&#x2192;</span>' +
          '<div><div class="wx-item-label">风向</div>' +
          '<div class="wx-item-val">' + wdirStr + ' ' + wdir + '°</div></div>' +
        '</div>' +
        '<div class="wx-item"><span class="wx-item-icon" style="font-size:18px;">hPa</span>' +
          '<div><div class="wx-item-label">气压</div>' +
          '<div class="wx-item-val">' + pres + ' hPa</div></div>' +
        '</div>' +
        '<div class="wx-item"><span class="wx-item-icon">💧</span>' +
          '<div><div class="wx-item-label">湿度</div>' +
          '<div class="wx-item-val">' + hum + '%</div></div>' +
        '</div>' +
      '</div>';
  });
}

// ══════════════════════════════════════════════════
// CALENDAR
// ══════════════════════════════════════════════════

var calViewYear, calViewMonth;

function renderCalendar(viewYear, viewMonth) {
  calViewYear = viewYear;
  calViewMonth = viewMonth;

  var today = new Date();
  var moon = moonPhase(today);

  // Header: big date
  var wd = WEEK_DAYS[today.getDay()];
  var lunarNote = moon.icon + ' ' + moon.name + '(第' + moon.age + '天)';
  var solar = SOLAR_TERMS[mmdd(today)];
  if (solar) lunarNote += ' · 【' + solar + '】';

  var header =
    '<div class="cal-header">' +
      '<div class="cal-header-left">' +
        '<div class="cal-big-date">' + today.getDate() + '</div>' +
        '<div class="cal-weekday">周' + wd + '</div>' +
      '</div>' +
      '<div class="cal-header-center">' + lunarNote + '</div>' +
      '<button id="refresh-btn" onclick="initAll()">↻</button>' +
    '</div>';

  // Mini calendar
  var firstDay = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

  var monthName = MONTHS_EN[viewMonth] + ' ' + viewYear;
  var nav =
    '<div class="cal-nav">' +
      '<button class="cal-nav-btn" onclick="navCal(-1)">‹</button>' +
      '<div class="cal-nav-title">' + monthName + '</div>' +
      '<button class="cal-nav-btn" onclick="navCal(1)">›</button>' +
    '</div>';

  var dow = '<div class="cal-dow">';
  var dowLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  for (var i = 0; i < 7; i++) {
    dow += '<span>' + dowLabels[i] + '</span>';
  }
  dow += '</div>';

  var days = '<div class="cal-days">';

  // Prev month fill
  for (var p = firstDay - 1; p >= 0; p--) {
    days += '<div class="cal-day other-month"><span class="dn">' + (daysInPrev - p) + '</span></div>';
  }

  // Current month days
  for (var d = 1; d <= daysInMonth; d++) {
    var dayDate = new Date(viewYear, viewMonth, d);
    var isToday = (viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate());
    var key = pad2(viewMonth+1) + '-' + pad2(d);
    var sterm = SOLAR_TERMS[key];
    var ushol = US_HOLIDAYS_2026[key];
    var mp = moonPhase(dayDate);
    var isFullNew = (mp.name === '满月' || mp.name === '新月');

    var cls = 'cal-day';
    if (isToday) cls += ' today';
    if (ushol) cls += ' us-holiday';

    var dots = '';
    if (sterm) dots += '<span class="cal-dot solar"></span>';
    if (isFullNew) dots += '<span class="cal-dot moon"></span>';
    if (ushol) dots += '<span class="cal-dot holiday"></span>';

    var tag = '';
    if (sterm) tag = '<span class="cal-day-tag">' + sterm + '</span>';
    else if (isFullNew && !sterm) tag = '<span class="cal-day-tag moon-tag">' + (mp.name === '满月' ? '满月' : '新月') + '</span>';
    else if (ushol) tag = '<span class="cal-day-tag" style="color:rgba(220,160,60,0.85)">' + ushol.substr(0,2) + '</span>';

    days += '<div class="' + cls + '">' +
      '<span class="dn">' + d + '</span>' +
      dots +
      tag +
    '</div>';
  }

  // Next month fill
  var total = firstDay + daysInMonth;
  var remaining = (7 - (total % 7)) % 7;
  for (var n = 1; n <= remaining; n++) {
    days += '<div class="cal-day other-month"><span class="dn">' + n + '</span></div>';
  }
  days += '</div>';

  var el = document.getElementById('cal-content');
  el.innerHTML = header +
    '<div class="cal-grid-wrap">' + nav + dow + days + '</div>';
}

function navCal(delta) {
  calViewMonth += delta;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  renderCalendar(calViewYear, calViewMonth);
}

// ══════════════════════════════════════════════════
// FISHING
// ══════════════════════════════════════════════════

function loadFishing() {
  var el = document.getElementById('fish-content');
  var today = new Date();
  var ds = dateStr(today);

  // We'll load marine + tides + wind in parallel using a counter
  var results = { marine: null, tides: null, wind: null, done: 0 };

  function onAllDone() {
    renderFishing(results.marine, results.tides, results.wind, today);
  }

  // Marine data from Open-Meteo
  var marineUrl = 'https://marine-api.open-meteo.com/v1/marine?latitude=' + HMB.lat +
    '&longitude=' + HMB.lon +
    '&hourly=wave_height,swell_wave_height,swell_wave_period&timezone=America%2FLos_Angeles&start_date=' + ds + '&end_date=' + ds;

  xhr(marineUrl, function(err, data) {
    if (!err && data && data.hourly) {
      results.marine = data.hourly;
    }
    results.done++;
    if (results.done === 3) onAllDone();
  });

  // HMB wind from Open-Meteo forecast
  var windUrl = 'https://api.open-meteo.com/v1/forecast?latitude=' + HMB.lat +
    '&longitude=' + HMB.lon +
    '&current=windspeed_10m,winddirection_10m&hourly=windspeed_10m&windspeed_unit=ms' +
    '&timezone=America%2FLos_Angeles&start_date=' + ds + '&end_date=' + ds;

  xhr(windUrl, function(err, data) {
    if (!err && data && data.current) {
      results.wind = data.current;
    }
    results.done++;
    if (results.done === 3) onAllDone();
  });

  // NOAA Tides
  var noaaUrl = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter' +
    '?begin_date=' + ds.replace(/-/g,'') +
    '&range=24&station=' + HMB.noaa +
    '&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=metric&application=fishing_app&format=json';

  xhr(noaaUrl, function(err, data) {
    if (!err && data && data.predictions) {
      results.tides = data.predictions;
    }
    results.done++;
    if (results.done === 3) onAllDone();
  });
}

function renderFishing(marine, tides, wind, today) {
  var el = document.getElementById('fish-content');

  // Extract noon values for score
  var waveArr = marine ? marine.wave_height : null;
  var swellArr = marine ? marine.swell_wave_height : null;
  var periodArr = marine ? marine.swell_wave_period : null;

  var noonWave = waveArr ? waveArr[12] : null;
  var noonSwell = swellArr ? swellArr[12] : null;
  var noonPeriod = periodArr ? periodArr[12] : null;

  // Wind
  var windSpeed = wind ? (wind.windspeed_10m || 0) : 0;
  var windDeg   = wind ? (wind.winddirection_10m || 0) : 0;
  var windDirStr = windDir(windDeg);

  // Score now includes real wind
  var score = scoreConditions(windSpeed, noonWave, 0);
  var stars = scoreStars(score);
  var sc = scoreClass(score);

  // Moon
  var moon = moonPhase(today);
  var moonBonus = (moon.name === '满月' || moon.name === '新月') ? '🌕 满/新月加成' : '';

  // Build hourly wave index for windows
  var hourlyWave = {};
  if (waveArr) {
    for (var i = 0; i < waveArr.length && i < 24; i++) {
      hourlyWave[i] = waveArr[i];
    }
  }
  var hourlyWind = {}; // we don't have HMB-specific wind here, use 0 as placeholder
  var windows = calcWindows(hourlyWind, hourlyWave, {}, tides);

  // Wave class
  var waveClass = '';
  if (noonWave !== null) {
    if (noonWave > 2.5) waveClass = 'warn';
    else if (noonWave > 1.5) waveClass = 'caution';
    else waveClass = 'good';
  }

  // Tide pills HTML
  var tidePills = '<div class="loading">无数据</div>';
  if (tides && tides.length > 0) {
    tidePills = '<div class="tide-row">';
    for (var t = 0; t < tides.length; t++) {
      var td = tides[t];
      var arrow = td.type === 'H' ? '▲' : '▽';
      var label = td.type === 'H' ? '高' : '低';
      var timeStr = td.t.substr(11, 5);
      var ht = parseFloat(td.v).toFixed(1);
      var pillCls = td.type === 'H' ? 'tide-pill high' : 'tide-pill';
      tidePills += '<span class="' + pillCls + '">' + arrow + label + ' ' + timeStr + ' ' + ht + 'm</span>';
    }
    tidePills += '</div>';
  }

  // Windows HTML
  var windowsHTML = '';
  if (windows.length > 0) {
    for (var wi = 0; wi < windows.length; wi++) {
      var w = windows[wi];
      windowsHTML += '<div class="fish-window">' +
        '<span class="fish-window-time">' + w.time + '</span>' +
        '<span class="fish-window-label">' + w.label + '</span>' +
        '<span class="fish-window-stars">' + w.stars + '</span>' +
      '</div>';
    }
  } else {
    windowsHTML = '<div class="loading">今日条件一般，无突出窗口</div>';
  }

  var html =
    '<div class="fish-header">' +
      '<div class="fish-title-block">' +
        '<div class="fish-spot">Jetty · HMB</div>' +
        '<div class="fish-coords">37.4963°N 122.4285°W</div>' +
      '</div>' +
      '<div class="fish-score-badge">' +
        '<div class="fish-score-num ' + sc + '">' + score + '</div>' +
        '<div class="fish-score-stars">' + stars + '</div>' +
        '<div class="fish-score-label">综合评分</div>' +
      '</div>' +
    '</div>';

  if (moonBonus) {
    html += '<div style="font-size:10px;color:rgba(200,175,90,0.85);margin-bottom:6px;">' + moonBonus + '</div>';
  }

  html += '<div class="fish-section-label">海况</div>';

  // Wind + wave on same compact row to save space
  var windClass = windSpeed > 10 ? 'warn' : (windSpeed > 7 ? 'caution' : (windSpeed > 5 ? '' : 'good'));
  html += '<div class="fish-data-row">' +
    '<span class="fish-data-icon">💨</span>' +
    '<span class="fish-data-label">风速 · ' + windDirStr + '</span>' +
    '<span class="fish-data-val ' + windClass + '">' + windSpeed.toFixed(1) + ' m/s</span>' +
  '</div>';

  if (noonWave !== null) {
    html += '<div class="fish-data-row">' +
      '<span class="fish-data-icon">🌊</span>' +
      '<span class="fish-data-label">浪高（noon）</span>' +
      '<span class="fish-data-val ' + waveClass + '">' + noonWave.toFixed(1) + ' m</span>' +
    '</div>';
  }

  if (noonSwell !== null) {
    var swClass = noonSwell > 2.0 ? 'warn' : (noonSwell > 1.2 ? 'caution' : '');
    html += '<div class="fish-data-row">' +
      '<span class="fish-data-icon">〰</span>' +
      '<span class="fish-data-label">涌浪高度</span>' +
      '<span class="fish-data-val ' + swClass + '">' + noonSwell.toFixed(1) + ' m</span>' +
    '</div>';
  }

  if (noonPeriod !== null) {
    html += '<div class="fish-data-row">' +
      '<span class="fish-data-icon">⏱</span>' +
      '<span class="fish-data-label">涌浪周期</span>' +
      '<span class="fish-data-val">' + Math.round(noonPeriod) + ' s</span>' +
    '</div>';
  }

  html += '<div class="fish-data-row">' +
    '<span class="fish-data-icon">' + moon.icon + '</span>' +
    '<span class="fish-data-label">月相</span>' +
    '<span class="fish-data-val">' + moon.name + ' (第' + moon.age + '天)</span>' +
  '</div>';

  html += '<div class="fish-section-label">潮汐 · NOAA</div>';
  html += tidePills;

  html += '<div class="fish-section-label">推荐时段</div>';
  html += windowsHTML;

  // Solar term note
  var st = SOLAR_TERMS[mmdd(today)];
  if (st) {
    html += '<div style="margin-top:8px;font-size:10px;color:rgba(80,195,135,0.8);">📅 今日节气：' + st + '</div>';
  }

  el.innerHTML = html;
}

// ══════════════════════════════════════════════════
// GEOLOCATION + INIT
// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
// LOCATION SWITCHER (no GPS)
// ══════════════════════════════════════════════════

var LOCATIONS = {
  fremont:  { lat: 37.5485, lon: -121.9886, name: 'Fremont' },
  sanjose:  { lat: 37.3382, lon: -121.8863, name: 'San Jose' }
};

var currentLoc = 'fremont';

function switchLoc(key) {
  currentLoc = key;
  var btns = ['fremont','sanjose'];
  for (var i = 0; i < btns.length; i++) {
    var el = document.getElementById('btn-' + btns[i]);
    if (el) el.className = 'loc-btn' + (btns[i] === key ? ' active' : '');
  }
  var loc = LOCATIONS[key];
  loadWeather(loc.lat, loc.lon, loc.name);
}

function initWeather() {
  var loc = LOCATIONS[currentLoc];
  loadWeather(loc.lat, loc.lon, loc.name);
}

function initAll() {
  var today = new Date();
  calViewYear  = today.getFullYear();
  calViewMonth = today.getMonth();

  renderCalendar(calViewYear, calViewMonth);
  initWeather();
  loadFishing();

  var ts = document.getElementById('timestamp');
  var h = today.getHours(), m = today.getMinutes();
  ts.textContent = '更新 ' + pad2(h) + ':' + pad2(m);
}

// Start
initAll();

// 每30分钟整页重新加载一次（比只调用initAll()更彻底：
// 老iPad长时间挂机运行，内存和JS状态容易累积异常，
// 整页reload相当于每次都重启一次，避免"假死"导致定时器失效）
setInterval(function(){
  location.reload();
}, 30 * 60 * 1000);

// 万一某次reload前，页面因切后台/短暂息屏而被系统暂停过，
// 重新可见时也立即刷新一次数据，双保险
function wakeRefresh() {
  initAll();
}
document.addEventListener('visibilitychange', function () {
  if (!document.hidden) wakeRefresh();
});
window.addEventListener('pageshow', wakeRefresh);
window.addEventListener('focus', wakeRefresh);

</script>
